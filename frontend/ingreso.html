<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ingresar medicamentos | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.ingreso-layout{display:grid;grid-template-columns:1fr 340px;gap:1.25rem;align-items:start}
.items-list{display:flex;flex-direction:column;gap:.6rem;margin-top:.75rem}
.item-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;position:relative}
.item-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.item-num{font-size:.75rem;font-weight:600;background:var(--brand-light);color:var(--brand);padding:2px 8px;border-radius:6px}
.pres-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.6rem}
.pres-btn{padding:.45rem .3rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:.75rem;text-align:center;transition:var(--transition);color:var(--text-2)}
.pres-btn:hover{border-color:var(--brand);color:var(--brand)}
.pres-btn.active{border-color:var(--brand);background:var(--brand-light);color:var(--brand);font-weight:500}
.precio-preview{display:flex;align-items:center;justify-content:space-between;background:var(--success-bg);border:1px solid #b8dfc9;border-radius:8px;padding:.5rem .75rem;margin-top:.4rem;font-size:.82rem}
.precio-preview .pv-val{font-weight:600;color:var(--success);font-size:.95rem}
.resumen-compra{display:flex;flex-direction:column;gap:.5rem}
.rc-row{display:flex;justify-content:space-between;font-size:.875rem;padding:.4rem 0;border-bottom:1px solid var(--border-soft)}
.rc-row:last-child{border-bottom:none}
.rc-total{font-size:1.05rem;font-weight:600;padding-top:.6rem;border-top:2px solid var(--border)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Ingresar medicamentos</div>
      <div class="topbar-sub">Registrar compra con uno o varios ítems</div>
    </div>
    <button class="btn btn-primary" onclick="agregarItem()">
      <i class="ti ti-plus" aria-hidden="true"></i> Agregar ítem
    </button>
  </div>
  <div class="page">
    <div class="ingreso-layout">
      <!-- Columna izquierda: ítems -->
      <div>
        <div class="card card-body" style="margin-bottom:1rem">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Proveedor</label>
              <select class="form-control" id="sel-proveedor">
                <option value="">— Seleccionar —</option>
              </select>
            </div>
          </div>
        </div>
        <div class="items-list" id="items-list"></div>
        <button class="btn btn-ghost btn-full mt-md" onclick="agregarItem()">
          <i class="ti ti-plus" aria-hidden="true"></i> Agregar otro medicamento
        </button>
      </div>
      <!-- Columna derecha: resumen -->
      <div class="card card-body" style="position:sticky;top:1rem">
        <div class="card-title mb-md">Resumen de la compra</div>
        <div class="resumen-compra" id="resumen-compra">
          <div class="text-muted text-sm">Sin ítems aún</div>
        </div>
        <button class="btn btn-primary btn-full btn-lg mt-lg" id="btn-registrar" onclick="registrarCompra()" disabled>
          <i class="ti ti-check" aria-hidden="true"></i> Registrar compra
        </button>
      </div>
    </div>
  </div>
</div>
<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
renderSidebar('ingreso');

const PRESENTACIONES = ['Tabletas','Cápsulas','Jarabe','Suspensión','Crema','Gel','Gotas','Inyectable','Parche','Polvo','Aerosol','Ovulo','Supositorio','Otros'];
let itemCount = 0;
let margenDefecto = 30;

async function init() {
  // Cargar proveedores
  const r = await fetch(`${API}/proveedores`);
  const provs = await r.json();
  const sel = document.getElementById('sel-proveedor');
  provs.forEach(p => {
    const o = document.createElement('option');
    o.value = p.idproveedor; o.textContent = p.nombre; sel.appendChild(o);
  });
  // Cargar margen defecto
  try {
    const rc = await fetch(`${API}/config`);
    const cfg = await rc.json();
    margenDefecto = parseFloat(cfg.margen_defecto || 30);
  } catch {}
  agregarItem();
}

function agregarItem() {
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.className = 'item-card';
  div.id = `item-${id}`;
  div.innerHTML = `
    <div class="item-card-header">
      <span class="item-num">Ítem #${id}</span>
      <button class="btn-icon btn-sm" onclick="quitarItem(${id})" title="Quitar ítem">
        <i class="ti ti-trash" style="color:var(--brand)"></i>
      </button>
    </div>
    <div class="form-row" style="grid-template-columns:1fr auto">
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Nombre del medicamento</label>
        <div class="autocomplete-wrap">
          <input type="text" class="form-control" id="nombre-${id}" placeholder="Ej: Amoxicilina" autocomplete="off" oninput="recalcular(${id})">
          <div class="autocomplete-list" id="ac-${id}"></div>
        </div>
      </div>
    </div>
    <div class="form-label" style="margin-bottom:.4rem">Presentación</div>
    <div class="pres-grid" id="pres-grid-${id}">
      ${PRESENTACIONES.map(p=>`<button type="button" class="pres-btn" data-pres="${p}" onclick="selPres(${id},'${p}',this)">${p}</button>`).join('')}
    </div>
    <input type="hidden" id="pres-${id}" value="">
    <div class="form-row">
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Descripción / dosis</label>
        <input type="text" class="form-control" id="desc-${id}" placeholder="Ej: 500mg, 30ml">
      </div>
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Fecha de vencimiento</label>
        <input type="date" class="form-control" id="vence-${id}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Cantidad (unidades)</label>
        <input type="number" class="form-control" id="cant-${id}" min="1" placeholder="0" oninput="recalcular(${id})">
      </div>
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Costo total del lote (C$)</label>
        <input type="number" class="form-control" id="costo-${id}" min="0" step="0.01" placeholder="0.00" oninput="recalcular(${id})">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Margen (%)</label>
        <input type="number" class="form-control" id="margen-${id}" min="1" max="99" value="${margenDefecto}" placeholder="${margenDefecto}" oninput="recalcular(${id})">
      </div>
      <div class="form-group" style="margin-bottom:.6rem">
        <label class="form-label">Precio venta manual (opcional)</label>
        <input type="number" class="form-control" id="pventa-${id}" min="0" step="0.01" placeholder="Auto" oninput="recalcular(${id})">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:.4rem">
      <label class="form-label">Ubicación en estante</label>
      <input type="text" class="form-control" id="ubic-${id}" placeholder="Ej: A3, Estante 2">
    </div>
    <div class="precio-preview" id="preview-${id}" style="display:none">
      <span>Precio de venta calculado</span>
      <span class="pv-val" id="pv-val-${id}">C$ 0.00</span>
    </div>`;
  document.getElementById('items-list').appendChild(div);

  // Autocomplete para nombre (busca existentes pero permite texto libre)
  setupAutocompleteNombre(id);
  recalcular(id);
  actualizarResumen();
}

function setupAutocompleteNombre(id) {
  const input = document.getElementById(`nombre-${id}`);
  const list  = document.getElementById(`ac-${id}`);
  let timer;

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) { list.classList.remove('open'); return; }
    timer = setTimeout(async () => {
      try {
        const r = await fetch(`${API}/inventario/buscar?q=${encodeURIComponent(q)}`);
        const grupos = await r.json();
        if (!grupos.length) { list.classList.remove('open'); return; }
        
        // Guardamos los datos de la base temporalmente en el input para usarlos al hacer click
        input.dataset.grupos = JSON.stringify(grupos);
        
        list.innerHTML = grupos.slice(0,8).map((g, idx) => `
          <div class="ac-item" onmousedown="event.preventDefault(); aplicarProductoExistente(${id}, ${idx})">
            <div class="ac-item-left">
              <span class="ac-item-name">${g.nombre}</span>
              <span class="ac-item-pres" style="color:var(--brand); font-weight: 500;">
                <i class="ti ti-check"></i> Comprado anteriormente
              </span>
            </div>
          </div>`).join('');
        list.classList.add('open');
      } catch {}
    }, 250);
  });
  document.addEventListener('click', e => {
    if (!input.contains(e.target)) list.classList.remove('open');
  });
}

function aplicarProductoExistente(id, index) {
  const input = document.getElementById(`nombre-${id}`);
  const list = document.getElementById(`ac-${id}`);
  const grupos = JSON.parse(input.dataset.grupos || '[]');
  const g = grupos[index];

  if (!g) return;

  // 1. Poner el nombre en el input y cerrar la lista
  input.value = g.nombre;
  list.classList.remove('open');

  // 2. Extraer las presentaciones que ya hemos comprado antes para este medicamento
  const presExistentes = [...new Set(g.lotes.map(l => l.presentacion))];

  // 3. Modificar el panel de botones de presentación
  const grid = document.getElementById(`pres-grid-${id}`);
  let html = '';

  // Primero mostramos resaltadas las que YA existen en base de datos
  presExistentes.forEach(p => {
    html += `<button type="button" class="pres-btn" style="border-color: var(--success); color: var(--success); font-weight: 600; background: var(--success-bg);" data-pres="${p}" onclick="selPres(${id},'${p}',this, true)">✓ ${p}</button>`;
  });

  // Luego mostramos las demás opciones grises por si quiere agregar una nueva presentación
  PRESENTACIONES.forEach(p => {
    if (!presExistentes.includes(p)) {
      html += `<button type="button" class="pres-btn" data-pres="${p}" onclick="selPres(${id},'${p}',this, false)">${p}</button>`;
    }
  });

  grid.innerHTML = html;

  // Guardar en la memoria del navegador para auto-completar datos al dar click
  window[`lotes_mem_${id}`] = g.lotes;

  // Si solo tiene 1 presentación existente, se selecciona en automático para ahorrarle un click al usuario
  if (presExistentes.length === 1) {
    const btn = grid.querySelector(`[data-pres="${presExistentes[0]}"]`);
    if (btn) btn.click();
  }
}

function selPres(id, pres, btn, esExistente = false) {
  document.querySelectorAll(`#pres-grid-${id} .pres-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pres-${id}`).value = pres;

  // AUTO-LLENADO MÁGICO: Si le dio click a una presentación verde, rellenar los datos
  if (esExistente && window[`lotes_mem_${id}`]) {
    const lotes = window[`lotes_mem_${id}`];
    // Buscar el lote más reciente de esta presentación
    const lote = lotes.find(l => l.presentacion === pres);
    
    if (lote) {
       // Rellenar campos si existen
       if (lote.descripcion) document.getElementById(`desc-${id}`).value = lote.descripcion;
       if (lote.ubicacion_estante) document.getElementById(`ubic-${id}`).value = lote.ubicacion_estante;
       if (lote.margen_porcentaje) document.getElementById(`margen-${id}`).value = lote.margen_porcentaje;
       
       recalcular(id); // Recalcular el precio de venta sugerido
       toast(`Datos cargados para: ${pres}`, 'ok', 2000);
    }
  } else {
    // Si selecciona una presentación nueva (gris), limpiamos los campos para que los escriba desde cero
    document.getElementById(`desc-${id}`).value = '';
    document.getElementById(`ubic-${id}`).value = '';
  }
}

function selPres(id, pres, btn) {
  document.querySelectorAll(`#pres-grid-${id} .pres-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pres-${id}`).value = pres;
}

function quitarItem(id) {
  document.getElementById(`item-${id}`)?.remove();
  actualizarResumen();
}

function recalcular(id) {
  const cant   = parseFloat(document.getElementById(`cant-${id}`).value) || 0;
  const costo  = parseFloat(document.getElementById(`costo-${id}`).value) || 0;
  const margen = parseFloat(document.getElementById(`margen-${id}`).value) || margenDefecto;
  const manual = parseFloat(document.getElementById(`pventa-${id}`).value) || 0;
  const prev   = document.getElementById(`preview-${id}`);
  const pvVal  = document.getElementById(`pv-val-${id}`);

  if (cant > 0 && costo > 0) {
    const costoUnit = costo / cant;
    const pv = manual > 0 ? manual : costoUnit * (1 + margen / 100);
    pvVal.textContent = 'C$ ' + pv.toFixed(2);
    prev.style.display = 'flex';
  } else {
    prev.style.display = 'none';
  }
  actualizarResumen();
}

function leerItems() {
  const cards = document.querySelectorAll('.item-card');
  return Array.from(cards).map(card => {
    const id = card.id.replace('item-','');
    return {
      nombre:          document.getElementById(`nombre-${id}`).value.trim(),
      presentacion:    document.getElementById(`pres-${id}`).value,
      descripcion:     document.getElementById(`desc-${id}`).value.trim(),
      cantidad:        parseInt(document.getElementById(`cant-${id}`).value) || 0,
      costoLote:       parseFloat(document.getElementById(`costo-${id}`).value) || 0,
      margen:          parseFloat(document.getElementById(`margen-${id}`).value) || margenDefecto,
      precioVenta:     parseFloat(document.getElementById(`pventa-${id}`).value) || 0,
      fechaVencimiento:document.getElementById(`vence-${id}`).value,
      ubicacion:       document.getElementById(`ubic-${id}`).value.trim(),
    };
  });
}

function actualizarResumen() {
  const items  = leerItems();
  const total  = items.reduce((s,i)=>s+i.costoLote, 0);
  const res    = document.getElementById('resumen-compra');
  const btn    = document.getElementById('btn-registrar');
  const validos= items.filter(i=>i.nombre && i.cantidad > 0 && i.costoLote > 0);
  btn.disabled = validos.length === 0 || !document.getElementById('sel-proveedor').value;

  if (!items.length || !items[0].nombre) {
    res.innerHTML = '<div class="text-muted text-sm">Sin ítems aún</div>'; return;
  }
  res.innerHTML = items.map(i=>`
    <div class="rc-row">
      <span class="text-sm">${i.nombre||'—'} (${i.cantidad} u.)</span>
      <span class="text-sm font-medium">${moneda(i.costoLote)}</span>
    </div>`).join('') +
    `<div class="rc-row rc-total"><span>Total compra</span><span>${moneda(total)}</span></div>`;
}

async function registrarCompra() {
  const idProveedor = document.getElementById('sel-proveedor').value;
  if (!idProveedor) { toast('Selecciona un proveedor','warn'); return; }
  const items = leerItems();
  for (const it of items) {
    if (!it.nombre)       { toast('Falta el nombre en algún ítem','warn'); return; }
    if (!it.presentacion) { toast(`Selecciona la presentación de "${it.nombre}"`, 'warn'); return; }
    if (it.cantidad <= 0) { toast(`Cantidad inválida en "${it.nombre}"`, 'warn'); return; }
    if (it.costoLote <= 0){ toast(`Costo inválido en "${it.nombre}"`, 'warn'); return; }
  }
  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/compras`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ idProveedor, idusuario: u.idusuario, items })
    });
    if (!r.ok) { const e=await r.json(); toast(e.error,'err'); btn.disabled=false; return; }
    const d = await r.json();
    toast(`Compra #${d.idcompra} registrada — Total: ${moneda(d.total)}`,'ok',4000);
    // Limpiar
    document.getElementById('items-list').innerHTML = '';
    itemCount = 0;
    agregarItem();
    actualizarResumen();
  } catch { toast('Error registrando compra','err'); btn.disabled=false; }
}

init();
</script>
</body>
</html>
