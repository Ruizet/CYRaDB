<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventario | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.filtros{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--border-soft)}
.filtro-btn{padding:.3rem .75rem;border:1.5px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;font-size:.78rem;font-weight:500;transition:var(--transition);color:var(--text-2)}
.filtro-btn.active{border-color:var(--brand);background:var(--brand-light);color:var(--brand)}
.filtro-btn.f-vencido.active{border-color:var(--danger);background:var(--danger-bg);color:var(--danger)}
.filtro-btn.f-critico.active{border-color:var(--warning);background:var(--warning-bg);color:var(--warning)}
.filtro-btn.f-agotado.active{border-color:var(--text-3);background:var(--surface-2);color:var(--text-2)}
.search-top{flex:1;min-width:180px;max-width:280px}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Inventario</div>
      <div class="topbar-sub" id="inv-count"></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="cargar()">
      <i class="ti ti-refresh" aria-hidden="true"></i> Actualizar
    </button>
  </div>
  <div class="page">
    <div class="card">
      <div class="filtros">
        <input type="text" class="form-control search-top" id="buscar" placeholder="Buscar…" oninput="filtrar()">
        <button class="filtro-btn active" data-f="todos"    onclick="setFiltro('todos',this)">Todos</button>
        <button class="filtro-btn f-vencido" data-f="vencido"  onclick="setFiltro('vencido',this)">Vencidos</button>
        <button class="filtro-btn f-critico" data-f="critico"  onclick="setFiltro('critico',this)">Vence &lt;30d</button>
        <button class="filtro-btn"           data-f="proximo"  onclick="setFiltro('proximo',this)">Vence &lt;90d</button>
        <button class="filtro-btn f-agotado" data-f="agotado"  onclick="setFiltro('agotado',this)">Agotados</button>
        <button class="filtro-btn"           data-f="bajo"     onclick="setFiltro('bajo',this)">Stock bajo</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Medicamento</th>
              <th>Presentación</th>
              <th>Descripción</th>
              <th>Stock</th>
              <th>Precio venta</th>
              <th>Vencimiento</th>
              <th>Estante</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal editar -->
<div class="modal-backdrop" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Editar lote</span>
      <button class="btn-icon" onclick="closeModal('modal-edit')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">Precio de venta (C$)</label>
        <input type="number" class="form-control" id="edit-precio" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Margen (%)</label>
        <input type="number" class="form-control" id="edit-margen" min="1" max="99">
      </div>
      <div class="form-group">
        <label class="form-label">Ubicación en estante</label>
        <input type="text" class="form-control" id="edit-ubic" placeholder="Ej: A3">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción / dosis</label>
        <input type="text" class="form-control" id="edit-desc">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
renderSidebar('inventario');

let todos = [];
let filtroActivo = 'todos';

const chips = {
  estado_vencimiento: {
    vencido:    ['chip-danger',  'Vencido'],
    critico:    ['chip-warning', 'Vence pronto'],
    proximo:    ['chip-warning', 'Próx. 90d'],
    vigente:    ['chip-success', 'Vigente'],
    sin_fecha:  ['chip-neutral', 'Sin fecha'],
  },
  estado_stock: {
    agotado: ['chip-danger',  'Agotado'],
    bajo:    ['chip-warning', 'Stock bajo'],
    normal:  ['chip-success', 'Normal'],
  }
};

async function cargar() {
  const r = await fetch(`${API}/inventario`);
  todos = await r.json();
  document.getElementById('inv-count').textContent = `${todos.length} lotes registrados`;
  filtrar();
}

function setFiltro(f, btn) {
  filtroActivo = f;
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filtrar();
}

function filtrar() {
  const q = document.getElementById('buscar').value.toLowerCase();
  let data = todos.filter(r => {
    const matchQ = !q ||
      r.nombremedicamento.toLowerCase().includes(q) ||
      (r.presentacion||'').toLowerCase().includes(q) ||
      (r.ubicacion_estante||'').toLowerCase().includes(q);
    const matchF = filtroActivo === 'todos' ? true
      : filtroActivo === 'agotado' ? r.estado_stock === 'agotado'
      : filtroActivo === 'bajo'    ? r.estado_stock === 'bajo'
      : r.estado_vencimiento === filtroActivo;
    return matchQ && matchF;
  });
  renderTabla(data);
}

function renderTabla(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="ti ti-clipboard-list"></i><p>Sin resultados</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r => {
    const [cvClass, cvLabel] = chips.estado_vencimiento[r.estado_vencimiento] || ['chip-neutral','—'];
    const [csClass, csLabel] = chips.estado_stock[r.estado_stock]             || ['chip-neutral','—'];
    return `<tr>
      <td class="font-medium">${r.nombremedicamento}</td>
      <td>${r.presentacion}</td>
      <td class="text-muted text-sm">${r.descripcion||'—'}</td>
      <td>
        <span class="chip ${csClass}">${r.cantidadlote}</span>
      </td>
      <td class="font-medium">C$ ${parseFloat(r.precioventa).toFixed(2)}</td>
      <td>
        <span class="chip ${cvClass}">${r.fechavencimiento ? fechaCorta(r.fechavencimiento) : 'Sin fecha'}</span>
      </td>
      <td>
        ${r.ubicacion_estante
          ? `<span class="chip chip-info"><i class="ti ti-map-pin" style="font-size:.7rem"></i> ${r.ubicacion_estante}</span>`
          : '<span class="text-muted text-sm">—</span>'}
      </td>
      <td>
        <button class="btn-icon btn-sm" onclick="abrirEdit(${r.idmedicamento})" title="Editar">
          <i class="ti ti-edit"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

function abrirEdit(id) {
  const r = todos.find(x=>x.idmedicamento===id);
  if (!r) return;
  document.getElementById('edit-id').value    = id;
  document.getElementById('edit-precio').value = r.precioventa;
  document.getElementById('edit-margen').value = r.margen_porcentaje;
  document.getElementById('edit-ubic').value   = r.ubicacion_estante || '';
  document.getElementById('edit-desc').value   = r.descripcion || '';
  openModal('modal-edit');
}

async function guardarEdit() {
  const id = document.getElementById('edit-id').value;
  const body = {
    precioventa:       parseFloat(document.getElementById('edit-precio').value),
    margen_porcentaje: parseFloat(document.getElementById('edit-margen').value),
    ubicacion_estante: document.getElementById('edit-ubic').value.trim(),
    descripcion:       document.getElementById('edit-desc').value.trim(),
  };
  try {
    const r = await fetch(`${API}/inventario/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) { const e=await r.json(); toast(e.error,'err'); return; }
    toast('Lote actualizado','ok');
    closeModal('modal-edit');
    cargar();
  } catch { toast('Error actualizando','err'); }
}

cargar();
</script>
</body>
</html>
