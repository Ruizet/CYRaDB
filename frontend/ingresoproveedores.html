<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proveedores | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Proveedores</div>
      <div class="topbar-sub" id="prov-count"></div>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-form')">
      <i class="ti ti-plus" aria-hidden="true"></i> Nuevo proveedor
    </button>
  </div>
  <div class="page">
    <div class="card">
      <div class="card-header">
        <input type="text" class="form-control" style="max-width:240px" id="buscar" placeholder="Buscar…" oninput="filtrar()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Nombre</th><th>Contacto</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal nuevo / editar -->
<div class="modal-backdrop" id="modal-form">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nuevo proveedor</span>
      <button class="btn-icon" onclick="closeModal('modal-form')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="f-nombre" placeholder="Nombre del proveedor">
      </div>
      <div class="form-group">
        <label class="form-label">Contacto</label>
        <input type="text" class="form-control" id="f-contacto" placeholder="Teléfono, correo, etc.">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-form')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
requireAuth('administrador');
renderSidebar('proveedores');
let todos = [];

async function cargar() {
  const r = await fetch(`${API}/proveedores`);
  todos = await r.json();
  document.getElementById('prov-count').textContent = `${todos.length} proveedores`;
  filtrar();
}

function filtrar() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const data = !q ? todos : todos.filter(p =>
    p.nombre.toLowerCase().includes(q) || (p.contacto||'').toLowerCase().includes(q)
  );
  renderTabla(data);
}

function renderTabla(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="ti ti-building-store"></i><p>Sin proveedores</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(p=>`<tr>
    <td class="text-muted text-sm">${p.idproveedor}</td>
    <td class="font-medium">${p.nombre}</td>
    <td class="text-muted">${p.contacto||'—'}</td>
    <td>
      <div class="flex-center gap-sm">
        <button class="btn-icon btn-sm" onclick='abrirEdit(${JSON.stringify(p)})' title="Editar"><i class="ti ti-edit"></i></button>
        <button class="btn-icon btn-sm" onclick="eliminar(${p.idproveedor})" title="Eliminar"><i class="ti ti-trash" style="color:var(--brand)"></i></button>
      </div>
    </td>
  </tr>`).join('');
}

function abrirNuevo() {
  document.getElementById('edit-id').value = '';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-contacto').value = '';
  document.getElementById('modal-title').textContent = 'Nuevo proveedor';
  openModal('modal-form');
}

function abrirEdit(p) {
  document.getElementById('edit-id').value = p.idproveedor;
  document.getElementById('f-nombre').value = p.nombre;
  document.getElementById('f-contacto').value = p.contacto || '';
  document.getElementById('modal-title').textContent = 'Editar proveedor';
  openModal('modal-form');
}

async function guardar() {
  const id      = document.getElementById('edit-id').value;
  const nombre  = document.getElementById('f-nombre').value.trim();
  const contacto= document.getElementById('f-contacto').value.trim();
  if (!nombre) { toast('El nombre es obligatorio','warn'); return; }
  try {
    const url    = id ? `${API}/proveedores/${id}` : `${API}/proveedores`;
    const method = id ? 'PUT' : 'POST';
    const r = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre,contacto})});
    if (!r.ok) { const e=await r.json(); toast(e.error,'err'); return; }
    toast(id ? 'Proveedor actualizado' : 'Proveedor creado','ok');
    closeModal('modal-form');
    cargar();
  } catch { toast('Error guardando','err'); }
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este proveedor?')) return;
  await fetch(`${API}/proveedores/${id}`,{method:'DELETE'});
  toast('Proveedor eliminado','ok');
  cargar();
}

// Botón "Nuevo proveedor" abre modal limpio
document.querySelector('.btn-primary').addEventListener('click', ()=>{
  abrirNuevo();
}, {once:false});

cargar();
</script>
</body>
</html>
