<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ventas | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.pos-layout{display:grid;grid-template-columns:1fr 380px;gap:1.25rem;height:calc(100vh - 120px)}
.tabs-bar{display:flex;align-items:center;gap:.35rem;padding:.5rem .75rem;background:var(--surface-2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.tab{display:flex;align-items:center;gap:.4rem;padding:.38rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:var(--transition);color:var(--text-2)}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.tab .tab-close{font-size:.75rem;opacity:.6;margin-left:.1rem;padding:1px 3px;border-radius:4px}
.tab .tab-close:hover{opacity:1;background:rgba(0,0,0,.15)}
.btn-new-tab{padding:.38rem .6rem;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text-3);cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:.3rem;transition:var(--transition)}
.btn-new-tab:hover{border-color:var(--brand);color:var(--brand)}
.pos-left{display:flex;flex-direction:column;gap:0;overflow:hidden;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface)}
.search-bar{padding:.75rem 1rem;border-bottom:1px solid var(--border-soft)}
.carrito{flex:1;overflow-y:auto;padding:.5rem}
.cart-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;margin-bottom:.35rem;background:var(--surface-2);border:1px solid var(--border-soft)}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:.875rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-sub{font-size:.75rem;color:var(--text-3);display:flex;align-items:center;gap:.5rem;margin-top:2px}
.loc-badge{background:var(--info-bg);color:var(--info);font-size:.68rem;font-weight:500;padding:1px 5px;border-radius:5px;display:inline-flex;align-items:center;gap:2px}
.qty-ctrl{display:flex;align-items:center;gap:.25rem;flex-shrink:0}
.qty-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:.9rem;font-weight:600;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.qty-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
.qty-num{width:32px;text-align:center;font-size:.875rem;font-weight:500}
.cart-item-price{font-size:.875rem;font-weight:600;color:var(--brand);flex-shrink:0;min-width:70px;text-align:right}
.pos-right{display:flex;flex-direction:column;gap:0;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface);overflow:hidden}
.resumen-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--border-soft);font-weight:600;font-size:.9rem}
.resumen-body{flex:1;padding:.85rem 1.1rem;display:flex;flex-direction:column;gap:.6rem}
.resumen-row{display:flex;justify-content:space-between;font-size:.875rem}
.resumen-row.total{font-size:1.1rem;font-weight:600;padding-top:.6rem;border-top:1px solid var(--border)}
.resumen-footer{padding:.85rem 1.1rem;border-top:1px solid var(--border-soft);display:flex;flex-direction:column;gap:.6rem}
.pago-tabs{display:flex;gap:.4rem}
.pago-tab{flex:1;padding:.4rem;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-size:.8rem;font-weight:500;cursor:pointer;text-align:center;transition:var(--transition);color:var(--text-2)}
.pago-tab.active{border-color:var(--brand);background:var(--brand-light);color:var(--brand)}
.carrito-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-3);gap:.5rem;padding:2rem}
.carrito-empty i{font-size:2.5rem;opacity:.25}
.carrito-empty p{font-size:.85rem}

/* Ticket print */
#ticket-print{display:none}
#ticket-print .t-sep{border:none;border-top:1px dashed #000;margin:4px 0}
#ticket-print .t-center{text-align:center}
#ticket-print .t-bold{font-weight:700}
#ticket-print .t-row{display:flex;justify-content:space-between}
#ticket-print .t-items{width:100%;border-collapse:collapse;font-size:11px}
#ticket-print .t-items td{padding:1px 0}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Punto de venta</div>
      <div class="topbar-sub">Múltiples clientes simultáneos</div>
    </div>
  </div>

  <!-- Barra de pestañas -->
  <div class="tabs-bar" id="tabs-bar">
    <button class="btn-new-tab" onclick="nuevaSesion()">
      <i class="ti ti-plus" aria-hidden="true"></i> Nueva caja
    </button>
  </div>

  <div class="page" style="padding-top:.75rem">
    <div id="pos-empty" style="text-align:center;padding:4rem;color:var(--text-3)">
      <i class="ti ti-shopping-cart" style="font-size:2.5rem;opacity:.2"></i>
      <p style="margin-top:.75rem;font-size:.9rem">Abre una caja para comenzar</p>
    </div>
    <div class="pos-layout" id="pos-layout" style="display:none">
      <!-- Izquierda: búsqueda + carrito -->
      <div class="pos-left">
        <div class="search-bar">
          <div class="autocomplete-wrap">
            <input type="text" class="form-control" id="buscar-med" placeholder="Buscar medicamento…" autocomplete="off">
            <div class="autocomplete-list" id="ac-list"></div>
          </div>
        </div>
        <div class="carrito" id="carrito">
          <div class="carrito-empty">
            <i class="ti ti-basket" aria-hidden="true"></i>
            <p>Busca un medicamento para agregar</p>
          </div>
        </div>
      </div>
      <!-- Derecha: resumen + pago -->
      <div class="pos-right">
        <div class="resumen-header">Resumen</div>
        <div class="resumen-body" id="resumen-body">
          <div style="color:var(--text-3);font-size:.85rem;text-align:center;margin-top:1rem">Sin productos</div>
        </div>
        <div class="resumen-footer">
          <div>
            <div class="form-label">Nombre del cliente (opcional)</div>
            <input type="text" class="form-control" id="nombre-cliente" placeholder="Cliente" style="margin-bottom:.6rem">
          </div>
          <div>
            <div class="form-label">Medio de pago</div>
            <div class="pago-tabs">
              <button class="pago-tab active" data-pago="efectivo" onclick="selPago(this)">Efectivo</button>
              <button class="pago-tab" data-pago="tarjeta" onclick="selPago(this)">Tarjeta</button>
              <button class="pago-tab" data-pago="transferencia" onclick="selPago(this)">Transfer.</button>
            </div>
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="btn-cobrar" onclick="confirmarVenta()" disabled>
            <i class="ti ti-check" aria-hidden="true"></i> Cobrar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Ticket modal -->
<div class="modal-backdrop" id="modal-ticket">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title"><i class="ti ti-receipt" aria-hidden="true"></i> Venta completada</span>
      <button class="btn-icon" onclick="closeModal('modal-ticket')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div id="ticket-print"><!-- se llena dinámicamente --></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-ticket')">Cerrar</button>
      <button class="btn btn-primary" onclick="imprimirTicket(document.getElementById('ticket-print').innerHTML)">
        <i class="ti ti-printer" aria-hidden="true"></i> Imprimir ticket
      </button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
renderSidebar('venta');

let sesionActual = null;   // idsesion activo
let sesiones = {};         // { idsesion: { nombre, items } }
let medioPago = 'efectivo';

/* ── Pago tabs ── */
function selPago(btn) {
  document.querySelectorAll('.pago-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  medioPago = btn.dataset.pago;
}

/* ── Sesiones / Tabs ── */
async function nuevaSesion() {
  try {
    const r = await fetch(`${API}/sesiones`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ idusuario: u.idusuario, nombre_cliente: 'Cliente' })
    });
    const s = await r.json();
    sesiones[s.idsesion] = { nombre: s.nombre_cliente, items: [] };
    renderTabs();
    activarSesion(s.idsesion);
  } catch { toast('Error abriendo caja','err'); }
}

function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  const tabsHtml = Object.entries(sesiones).map(([id, s]) => `
    <div class="tab ${parseInt(id)===sesionActual?'active':''}" onclick="activarSesion(${id})">
      <i class="ti ti-user" style="font-size:.8rem" aria-hidden="true"></i>
      <span>${s.nombre}</span>
      <span class="tab-close" onclick="event.stopPropagation();cerrarSesion(${id})" title="Cancelar">✕</span>
    </div>`).join('');
  bar.innerHTML = tabsHtml + `<button class="btn-new-tab" onclick="nuevaSesion()"><i class="ti ti-plus" aria-hidden="true"></i> Nueva caja</button>`;
}

function activarSesion(id) {
  sesionActual = parseInt(id);
  document.getElementById('pos-empty').style.display = 'none';
  document.getElementById('pos-layout').style.display = 'grid';
  renderTabs();
  cargarCarrito();
  sincNombreCliente();
}

function sincNombreCliente() {
  const s = sesiones[sesionActual];
  if (s) document.getElementById('nombre-cliente').value = s.nombre === 'Cliente' ? '' : s.nombre;
}

document.getElementById('nombre-cliente').addEventListener('change', async function() {
  const nombre = this.value.trim() || 'Cliente';
  if (!sesionActual) return;
  sesiones[sesionActual].nombre = nombre;
  renderTabs();
  await fetch(`${API}/sesiones/${sesionActual}/nombre`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ nombre_cliente: nombre })
  });
});

async function cerrarSesion(id) {
  if (!confirm('¿Cancelar esta caja? Se perderá el carrito.')) return;
  await fetch(`${API}/sesiones/${id}`, { method:'DELETE' });
  delete sesiones[id];
  if (sesionActual === id) {
    const ids = Object.keys(sesiones);
    if (ids.length) activarSesion(ids[0]);
    else {
      sesionActual = null;
      document.getElementById('pos-empty').style.display = 'block';
      document.getElementById('pos-layout').style.display = 'none';
    }
  }
  renderTabs();
}

/* ── Autocomplete ── */
setupAutocomplete(
  document.getElementById('buscar-med'),
  document.getElementById('ac-list'),
  agregarAlCarrito
);

/* ── Carrito ── */
async function agregarAlCarrito(lote) {
  if (!sesionActual) return;
  try {
    const r = await fetch(`${API}/sesiones/${sesionActual}/items`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ idmedicamento: lote.idmedicamento, cantidad: 1 })
    });
    if (!r.ok) { const e=await r.json(); toast(e.error,'err'); return; }
    toast(`${lote.nombremedicamento} agregado`,'ok',1800);
    cargarCarrito();
  } catch { toast('Error agregando producto','err'); }
}

async function cargarCarrito() {
  if (!sesionActual) return;
  try {
    const r = await fetch(`${API}/sesiones/${sesionActual}/items`);
    const items = await r.json();
    sesiones[sesionActual].items = items;
    renderCarrito(items);
    renderResumen(items);
  } catch {}
}

function renderCarrito(items) {
  const el = document.getElementById('carrito');
  if (!items.length) {
    el.innerHTML = `<div class="carrito-empty"><i class="ti ti-basket" aria-hidden="true"></i><p>Busca un medicamento para agregar</p></div>`;
    return;
  }
  el.innerHTML = items.map(it => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${it.nombremedicamento}</div>
        <div class="cart-item-sub">
          <span>${it.presentacion}</span>
          ${it.ubicacion_estante ? `<span class="loc-badge"><i class="ti ti-map-pin" style="font-size:.65rem"></i>${it.ubicacion_estante}</span>` : ''}
          <span style="color:var(--text-3)">Disp: ${it.stock_disponible}</span>
        </div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cambiarCantidad(${it.idmedicamento},${it.cantidad-1})">−</button>
        <span class="qty-num">${it.cantidad}</span>
        <button class="qty-btn" onclick="cambiarCantidad(${it.idmedicamento},${it.cantidad+1})">+</button>
      </div>
      <div class="cart-item-price">${moneda(it.subtotal)}</div>
      <button class="btn-icon btn-sm" onclick="quitarItem(${it.idmedicamento})" title="Quitar">
        <i class="ti ti-trash" style="font-size:.85rem;color:var(--brand)"></i>
      </button>
    </div>`).join('');
}

function renderResumen(items) {
  const total = items.reduce((s,i)=>s+parseFloat(i.subtotal),0);
  const body = document.getElementById('resumen-body');
  const btn  = document.getElementById('btn-cobrar');
  if (!items.length) {
    body.innerHTML = '<div style="color:var(--text-3);font-size:.85rem;text-align:center;margin-top:1rem">Sin productos</div>';
    btn.disabled = true; return;
  }
  body.innerHTML = items.map(it=>`
    <div class="resumen-row">
      <span class="text-sm">${it.nombremedicamento} ×${it.cantidad}</span>
      <span class="text-sm font-medium">${moneda(it.subtotal)}</span>
    </div>`).join('') +
    `<div class="resumen-row total"><span>Total</span><span>${moneda(total)}</span></div>`;
  btn.disabled = false;
}

async function cambiarCantidad(idmed, nuevaCant) {
  if (nuevaCant < 1) { quitarItem(idmed); return; }
  await fetch(`${API}/sesiones/${sesionActual}/items`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ idmedicamento: idmed, cantidad: nuevaCant })
  });
  cargarCarrito();
}

async function quitarItem(idmed) {
  await fetch(`${API}/sesiones/${sesionActual}/items/${idmed}`, { method:'DELETE' });
  cargarCarrito();
}

/* ── Confirmar venta ── */
async function confirmarVenta() {
  if (!sesionActual) return;
  const btn = document.getElementById('btn-cobrar');
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/sesiones/${sesionActual}/confirmar`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mediopago: medioPago })
    });
    if (!r.ok) { const e=await r.json(); toast(e.error,'err'); btn.disabled=false; return; }
    const d = await r.json();
    const items = sesiones[sesionActual]?.items || [];
    const nombre = sesiones[sesionActual]?.nombre || 'Cliente';
    mostrarTicket(d.idventa, d.total, items, nombre);
    delete sesiones[sesionActual];
    sesionActual = null;
    renderTabs();
    document.getElementById('pos-empty').style.display = 'block';
    document.getElementById('pos-layout').style.display = 'none';
  } catch { toast('Error procesando venta','err'); btn.disabled=false; }
}

/* ── Ticket ── */
async function mostrarTicket(idventa, total, items, cliente) {
  // Cargar config de farmacia
  let cfg = {};
  try { const r=await fetch(`${API}/config`); cfg=await r.json(); } catch {}
  const nombre_farm = cfg.nombre_farmacia || 'Farmacia C&R';
  const dir         = cfg.direccion || '';
  const tel         = cfg.telefono  || '';
  const ahora = new Date().toLocaleString('es-NI',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const filas = items.map(it=>`
    <tr>
      <td>${it.nombremedicamento}</td>
      <td style="text-align:center">×${it.cantidad}</td>
      <td style="text-align:right">${moneda(it.subtotal)}</td>
    </tr>`).join('');

  document.getElementById('ticket-print').innerHTML = `
    <div class="t-center"><div class="t-bold" style="font-size:14px">${nombre_farm}</div>
      ${dir?`<div>${dir}</div>`:''}${tel?`<div>Tel: ${tel}</div>`:''}
    </div>
    <hr class="t-sep">
    <div class="t-row"><span>Venta #${idventa}</span><span>${ahora}</span></div>
    <div>Cliente: ${cliente}</div>
    <div>Vendedor: ${u.nombre}</div>
    <hr class="t-sep">
    <table class="t-items">
      <thead><tr><th style="text-align:left">Producto</th><th style="text-align:center">Cant</th><th style="text-align:right">Monto</th></tr></thead>
      <tbody>${filas}</tbody>
    </table>
    <hr class="t-sep">
    <div class="t-row t-bold"><span>TOTAL</span><span>${moneda(total)}</span></div>
    <div>Pago: ${medioPago}</div>
    <hr class="t-sep">
    <div class="t-center" style="font-size:10px;margin-top:4px">¡Gracias por su compra!</div>`;

  openModal('modal-ticket');
}
</script>
</body>
</html>
