<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-wrap{width:100%;max-width:380px;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.25rem;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo .lg-name{font-size:1.5rem;font-weight:600;color:var(--brand);letter-spacing:-.4px}
.login-logo .lg-sub{font-size:.82rem;color:var(--text-3);margin-top:3px}
.login-cross{width:44px;height:44px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem}
.login-cross i{font-size:1.4rem;color:#fff}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-cross"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
      <div class="lg-name">Farmacia C&R</div>
      <div class="lg-sub">Sistema de gestión</div>
    </div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input type="text" class="form-control" id="usuario" autocomplete="username" placeholder="Tu usuario">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="contrasena" autocomplete="current-password" placeholder="Tu contraseña">
    </div>
    <div id="msg" style="display:none;margin-bottom:.75rem;padding:.55rem .75rem;border-radius:8px;font-size:.85rem"></div>
    <button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="login()">
      <i class="ti ti-login" aria-hidden="true"></i> Ingresar
    </button>
  </div>
  <div style="text-align:right;margin:-.5rem 0 1rem">
  <a href="#" id="olvide-password"
     style="font-size:.85rem;color:var(--brand);text-decoration:none">
     ¿Olvidaste tu contraseña?
  </a>
  </div>
</div>
<div class="modal-backdrop" id="modalRecuperar">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Recuperar contraseña</div>
      <button class="btn-icon" onclick="closeModal('modalRecuperar')">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email"
               id="correoRecuperacion"
               class="form-control"
               placeholder="correo@ejemplo.com">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost"
              onclick="closeModal('modalRecuperar')">
        Cancelar
      </button>

      <button class="btn btn-primary"
              onclick="enviarCodigo()">
        Enviar código
      </button>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="modalCambiarPassword">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Restablecer Contraseña</div>
      <button class="btn-icon" onclick="closeModal('modalCambiarPassword')">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Código de 6 dígitos</label>
        <input type="text" id="codigoIngresado" class="form-control" placeholder="123456" maxlength="6" style="text-align:center; font-size: 1.2rem; letter-spacing: 4px;">
      </div>
      <div class="form-group">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" class="form-control" id="nuevaContrasena" placeholder="Mínimo 6 caracteres">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalCambiarPassword')">Cancelar</button>
      <button class="btn btn-primary" onclick="cambiarPassword()">Actualizar Contraseña</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
document.getElementById('contrasena').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
async function login() {
  const usuario   = document.getElementById('usuario').value.trim();
  const contrasena= document.getElementById('contrasena').value;
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('msg');
  if (!usuario||!contrasena) { showMsg('Completa ambos campos','err'); return; }
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Ingresando…';
  try {
    const r = await fetch(`${API}/usuarios/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,contrasena})});
    const d = await r.json();
    if (r.ok) { localStorage.setItem('usuarioActual',JSON.stringify(d)); location.href='dashboard.html'; }
    else showMsg(d.error||'Credenciales incorrectas','err');
  } catch { showMsg('Sin conexión al servidor','err'); }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-login"></i> Ingresar';
}
function showMsg(t,tipo) {
  const m=document.getElementById('msg');
  m.textContent=t; m.style.display='block';
  m.style.background=tipo==='err'?'var(--danger-bg)':'var(--success-bg)';
  m.style.color=tipo==='err'?'var(--danger)':'var(--success)';
}
document.getElementById('olvide-password')
  .addEventListener('click', e => {
    e.preventDefault();
    openModal('modalRecuperar');
  });document.getElementById('olvide-password')
  .addEventListener('click', e => {
    e.preventDefault();
    openModal('modalRecuperar');
  });

let correoEnRecuperacion = "";

async function enviarCodigo() {
  const correo = document.getElementById('correoRecuperacion').value.trim();
  const btn = document.querySelector('#modalRecuperar .btn-primary');
  
  if (!correo) { alert('Por favor, ingresa tu correo electrónico.'); return; }

  btn.disabled = true; btn.textContent = 'Enviando...';

  try {
    const r = await fetch(`${API}/usuarios/recuperar-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correo })
    });
    
    const d = await r.json();

    if (r.ok) {
      correoEnRecuperacion = correo;
      closeModal('modalRecuperar');
      openModal('modalCambiarPassword');
      document.getElementById('correoRecuperacion').value = '';
    } else {
      alert(d.error || 'No se pudo enviar el código.');
    }
  } catch { alert('Error de conexión con el servidor.'); }

  btn.disabled = false; btn.textContent = 'Enviar código';
}

async function cambiarPassword() {
  const codigo = document.getElementById('codigoIngresado').value.trim();
  const nuevaClave = document.getElementById('nuevaContrasena').value;
  const btn = document.querySelector('#modalCambiarPassword .btn-primary');

  if (!codigo || !nuevaClave) { alert('Completa ambos campos.'); return; }
  if (nuevaClave.length < 4) { alert('La contraseña es muy corta.'); return; } // Ajusta según tu gusto

  btn.disabled = true; btn.textContent = 'Procesando...';

  try {
    const r = await fetch(`${API}/usuarios/restablecer-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correo: correoEnRecuperacion, codigo, nuevaClave })
    });

    const d = await r.json();

    if (r.ok) {
      alert('¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.');
      closeModal('modalCambiarPassword');
      // Limpiar campos
      document.getElementById('codigoIngresado').value = '';
      document.getElementById('nuevaContrasena').value = '';
    } else {
      alert(d.error || 'Código incorrecto o vencido.');
    }
  } catch { alert('Error de conexión al servidor.'); }

  btn.disabled = false; btn.textContent = 'Actualizar Contraseña';
}
  
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
