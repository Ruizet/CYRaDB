<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-wrap{width:100%;max-width:380px;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.25rem;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:1.75rem}
.login-logo .lg-name{font-size:1.5rem;font-weight:600;color:var(--brand);letter-spacing:-.4px}
.login-logo .lg-sub{font-size:.82rem;color:var(--text-3);margin-top:3px}
.login-cross{width:44px;height:44px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem}
.login-cross i{font-size:1.4rem;color:#fff}
.forgot-link{display:block;text-align:center;margin-top:1rem;font-size:.82rem;color:var(--text-3);text-decoration:none;transition:color .15s}
.forgot-link:hover{color:var(--brand)}

/* Panel de recuperación (dentro de la misma card) */
.panel{display:none}
.panel.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;color:var(--text-3);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.1rem;transition:color .15s}
.back-btn:hover{color:var(--brand)}
.success-box{text-align:center;padding:1.5rem 0 .5rem}
.success-box i{font-size:2.5rem;color:var(--success)}
.success-box p{margin-top:.75rem;font-size:.9rem;color:var(--text-2);line-height:1.6}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <!-- Logo (siempre visible) -->
    <div class="login-logo">
      <div class="login-cross"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
      <div class="lg-name">Farmacia C&R</div>
      <div class="lg-sub">Sistema de gestión</div>
    </div>

    <!-- Panel: Login -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario" autocomplete="username" placeholder="Tu usuario">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" autocomplete="current-password" placeholder="Tu contraseña">
      </div>
      <div id="msg-login" style="display:none;margin-bottom:.75rem;padding:.55rem .75rem;border-radius:8px;font-size:.85rem"></div>
      <button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="login()">
        <i class="ti ti-login" aria-hidden="true"></i> Ingresar
      </button>
      <a class="forgot-link" onclick="irRecuperar()">
        <i class="ti ti-lock-question" style="font-size:.85rem"></i> ¿Olvidaste tu contraseña?
      </a>
    </div>

    <!-- Panel: Solicitar reset -->
    <div class="panel" id="panel-recuperar">
      <button class="back-btn" onclick="irLogin()">
        <i class="ti ti-arrow-left"></i> Volver al inicio
      </button>
      <div class="form-group">
        <label class="form-label">Tu nombre de usuario</label>
        <input type="text" class="form-control" id="rec-usuario" placeholder="Usuario registrado">
      </div>
      <div id="msg-rec" style="display:none;margin-bottom:.75rem;padding:.55rem .75rem;border-radius:8px;font-size:.85rem"></div>
      <button class="btn btn-primary btn-full" id="btn-rec" onclick="solicitarReset()">
        <i class="ti ti-send" aria-hidden="true"></i> Enviar enlace de recuperación
      </button>
    </div>

    <!-- Panel: Enviado con éxito -->
    <div class="panel" id="panel-enviado">
      <div class="success-box">
        <i class="ti ti-mail-check" aria-hidden="true"></i>
        <p>Recibirás el enlace en unos minutos.<br>Revisa también tu carpeta de spam.</p>
      </div>
      <button class="btn btn-ghost btn-full mt-md" onclick="irLogin()">
        <i class="ti ti-arrow-left" aria-hidden="true"></i> Volver al inicio
      </button>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
/* ── Navegación entre paneles ── */
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function irLogin()     { showPanel('panel-login'); }
function irRecuperar() { showPanel('panel-recuperar'); }

/* ── Login ── */
document.getElementById('contrasena').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('rec-usuario').addEventListener('keydown', e => { if (e.key === 'Enter') solicitarReset(); });

async function login() {
  const usuario    = document.getElementById('usuario').value.trim();
  const contrasena = document.getElementById('contrasena').value;
  const btn = document.getElementById('btn-login');
  if (!usuario || !contrasena) { showMsg('msg-login', 'Completa ambos campos', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Ingresando…';
  try {
    const r = await fetch(`${API}/usuarios/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, contrasena })
    });
    const d = await r.json();
    if (r.ok) { localStorage.setItem('usuarioActual', JSON.stringify(d)); location.href = 'dashboard.html'; }
    else showMsg('msg-login', d.error || 'Credenciales incorrectas', 'err');
  } catch { showMsg('msg-login', 'Sin conexión al servidor', 'err'); }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-login"></i> Ingresar';
}

/* ── Recuperar contraseña ── */
async function solicitarReset() {
  const usuario = document.getElementById('rec-usuario').value.trim();
  const btn = document.getElementById('btn-rec');
  if (!usuario) { showMsg('msg-rec', 'Ingresa tu nombre de usuario', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Enviando…';
  try {
    const r = await fetch(`${API}/auth/solicitar-reset`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario })
    });
    const d = await r.json();
    if (r.ok) { showPanel('panel-enviado'); }
    else showMsg('msg-rec', d.error || 'Error enviando el correo', 'err');
  } catch { showMsg('msg-rec', 'Sin conexión al servidor', 'err'); }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-send"></i> Enviar enlace de recuperación';
}

/* ── Helper mensaje ── */
function showMsg(elId, texto, tipo) {
  const m = document.getElementById(elId);
  m.textContent = texto;
  m.style.display = 'block';
  m.style.background = tipo === 'err' ? 'var(--danger-bg)' : 'var(--success-bg)';
  m.style.color      = tipo === 'err' ? 'var(--danger)'    : 'var(--success)';
}
</script>
<style>@keyframes spin { to { transform: rotate(360deg) } }</style>
</body>
</html>
