<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Historial de ventas | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.pago-chip{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .6rem;border-radius:20px;font-size:.75rem;font-weight:500}
.pago-efectivo{background:#e8f5ee;color:#1a7f4e}
.pago-tarjeta{background:#e6f0fb;color:#1a5fa0}
.pago-transferencia{background:#fdf3e0;color:#a05a00}
.items-detalle{font-size:.8rem;color:var(--text-2);margin-top:.35rem;line-height:1.6}
#ticket-print{display:none}
#ticket-print .t-sep{border:none;border-top:1px dashed #000;margin:4px 0}
#ticket-print .t-center{text-align:center}
#ticket-print .t-bold{font-weight:700}
#ticket-print .t-row{display:flex;justify-content:space-between}
#ticket-print .t-items{width:100%;border-collapse:collapse;font-size:11px}
#ticket-print .t-items td{padding:1px 0}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Historial de ventas</div>
      <div class="topbar-sub" id="venta-count"></div>
    </div>
    <div class="flex-center gap-sm">
      <input type="text" class="form-control" style="width:220px" id="buscar" placeholder="Buscar…" oninput="filtrar()">
      <button class="btn btn-ghost btn-sm" onclick="cargar()"><i class="ti ti-refresh" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="page">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>Vendedor</th>
              <th>Productos</th>
              <th>Medio de pago</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal ticket reimpresión -->
<div class="modal-backdrop" id="modal-ticket">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title"><i class="ti ti-receipt" aria-hidden="true"></i> Ticket de venta</span>
      <button class="btn-icon" onclick="closeModal('modal-ticket')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div id="ticket-print"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-ticket')">Cerrar</button>
      <button class="btn btn-primary" onclick="imprimirTicket(document.getElementById('ticket-print').innerHTML)">
        <i class="ti ti-printer" aria-hidden="true"></i> Imprimir
      </button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
renderSidebar('detalleventas');
let todas = [];
let cfg   = {};

async function cargar() {
  try {
    const [rv, rc] = await Promise.all([
      fetch(`${API}/ventas`),
      fetch(`${API}/config`)
    ]);
    todas = await rv.json();
    cfg   = await rc.json();
    document.getElementById('venta-count').textContent = `${todas.length} ventas registradas`;
    filtrar();
  } catch { toast('Error cargando ventas','err'); }
}

function filtrar() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const data = !q ? todas : todas.filter(v =>
    String(v.idventa).includes(q) ||
    (v.nombre_cliente||'').toLowerCase().includes(q) ||
    (v.usuario||'').toLowerCase().includes(q) ||
    (v.mediopago||'').toLowerCase().includes(q)
  );
  renderTabla(data);
}

function renderTabla(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="ti ti-receipt"></i><p>Sin ventas</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(v => {
    const items = Array.isArray(v.items) ? v.items : [];
    const resumen = items.slice(0,2).map(i=>`${i.nombre} ×${i.cantidad}`).join(', ') + (items.length>2?` y ${items.length-2} más`:'');
    const pagoClass = {efectivo:'pago-efectivo',tarjeta:'pago-tarjeta',transferencia:'pago-transferencia'}[v.mediopago]||'';
    return `<tr>
      <td class="font-medium text-brand">#${v.idventa}</td>
      <td>${fechaHora(v.fecha)}</td>
      <td>${v.nombre_cliente||'—'}</td>
      <td>${v.usuario}</td>
      <td>
        <div class="font-medium text-sm">${items.length} producto(s)</div>
        <div class="items-detalle">${resumen||'—'}</div>
      </td>
      <td><span class="pago-chip ${pagoClass}">${v.mediopago}</span></td>
      <td class="font-semi">C$ ${parseFloat(v.totalcobro).toFixed(2)}</td>
      <td>
        <button class="btn-icon btn-sm" onclick="reimprimir(${v.idventa})" title="Ver ticket">
          <i class="ti ti-printer"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

async function reimprimir(idventa) {
  try {
    const r  = await fetch(`${API}/ventas/${idventa}`);
    const v  = await r.json();
    const items = Array.isArray(v.items) ? v.items : [];
    const nombre_farm = cfg.nombre_farmacia || 'Farmacia C&R';
    const dir  = cfg.direccion || '';
    const tel  = cfg.telefono  || '';
    const fecha = fechaHora(v.fecha);
    const filas = items.map(i=>`<tr>
      <td>${i.nombre}</td>
      <td style="text-align:center">×${i.cantidad}</td>
      <td style="text-align:right">C$ ${parseFloat(i.subtotal).toFixed(2)}</td>
    </tr>`).join('');
    document.getElementById('ticket-print').innerHTML = `
      <div class="t-center"><div class="t-bold" style="font-size:14px">${nombre_farm}</div>
        ${dir?`<div>${dir}</div>`:''}${tel?`<div>Tel: ${tel}</div>`:''}
      </div>
      <hr class="t-sep">
      <div class="t-row"><span>Venta #${v.idventa}</span><span>${fecha}</span></div>
      <div>Cliente: ${v.nombre_cliente||'Cliente'}</div>
      <div>Vendedor: ${v.usuario}</div>
      <hr class="t-sep">
      <table class="t-items">
        <thead><tr><th style="text-align:left">Producto</th><th style="text-align:center">Cant</th><th style="text-align:right">Monto</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
      <hr class="t-sep">
      <div class="t-row t-bold"><span>TOTAL</span><span>C$ ${parseFloat(v.totalcobro).toFixed(2)}</span></div>
      <div>Pago: ${v.mediopago}</div>
      <hr class="t-sep">
      <div class="t-center" style="font-size:10px;margin-top:4px">¡Gracias por su compra!</div>`;
    openModal('modal-ticket');
  } catch { toast('Error cargando ticket','err'); }
}

cargar();
</script>
</body>
</html>
