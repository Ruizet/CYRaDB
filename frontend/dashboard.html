<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.kpi{padding:1.1rem 1.25rem;display:flex;align-items:center;gap:.9rem}
.kpi-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon i{font-size:1.3rem}
.kpi-val{font-size:1.6rem;font-weight:600;line-height:1.1;letter-spacing:-.5px}
.kpi-label{font-size:.75rem;color:var(--text-3);margin-top:2px}
.ic-brand{background:var(--brand-light);color:var(--brand)}
.ic-success{background:var(--success-bg);color:var(--success)}
.ic-warning{background:var(--warning-bg);color:var(--warning)}
.ic-info{background:var(--info-bg);color:var(--info)}
.alerts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.alert-row{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .75rem;border-radius:8px;border:1px solid var(--border-soft)}
.alert-row.nivel-critico{background:var(--danger-bg);border-color:var(--brand-mid)}
.alert-row.nivel-advertencia{background:var(--warning-bg);border-color:#f0d89a}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
.alert-row.nivel-critico .alert-icon{color:var(--brand)}
.alert-row.nivel-advertencia .alert-icon{color:var(--warning)}
.alert-desc{font-size:.82rem;font-weight:500;color:var(--text-1);line-height:1.35}
.alert-detalle{font-size:.75rem;color:var(--text-3);margin-top:2px}
@media(max-width:1100px){.kpi-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.alerts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-sub" id="fecha-hoy"></div>
    </div>
  </div>
  <div class="page">
    <div class="kpi-grid">
      <div class="card kpi">
        <div class="kpi-icon ic-brand"><i class="ti ti-receipt" aria-hidden="true"></i></div>
        <div><div class="kpi-val" id="kpi-ventas">—</div><div class="kpi-label">Ventas hoy</div></div>
      </div>
      <div class="card kpi">
        <div class="kpi-icon ic-success"><i class="ti ti-cash" aria-hidden="true"></i></div>
        <div><div class="kpi-val" id="kpi-ingresos">—</div><div class="kpi-label">Ingresos hoy</div></div>
      </div>
      <div class="card kpi">
        <div class="kpi-icon ic-warning"><i class="ti ti-alert-triangle" aria-hidden="true"></i></div>
        <div><div class="kpi-val" id="kpi-alertas">—</div><div class="kpi-label">Alertas críticas</div></div>
      </div>
      <div class="card kpi">
        <div class="kpi-icon ic-info"><i class="ti ti-shopping-cart" aria-hidden="true"></i></div>
        <div><div class="kpi-val" id="kpi-sesiones">—</div><div class="kpi-label">Cajas abiertas</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><i class="ti ti-alert-circle" style="color:var(--brand);margin-right:.4rem" aria-hidden="true"></i>Alertas activas</span>
        <button class="btn btn-ghost btn-sm" onclick="cargarAlertas()"><i class="ti ti-refresh" aria-hidden="true"></i> Actualizar</button>
      </div>
      <div class="card-body">
        <div id="alertas-area"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-NI',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

async function cargarKPIs() {
  try {
    const r = await fetch(`${API}/dashboard/hoy`);
    const d = await r.json();
    document.getElementById('kpi-ventas').textContent = d.ventas_hoy ?? 0;
    document.getElementById('kpi-ingresos').textContent = moneda(d.ingresos_hoy);
    document.getElementById('kpi-alertas').textContent = d.alertas_criticas ?? 0;
    document.getElementById('kpi-sesiones').textContent = d.sesiones_abiertas ?? 0;
    renderSidebar('dashboard', d.alertas_criticas > 0 ? d.alertas_criticas : null);
  } catch { toast('Error cargando KPIs','err'); }
}

async function cargarAlertas() {
  try {
    const r = await fetch(`${API}/dashboard/alertas`);
    const data = await r.json();
    const area = document.getElementById('alertas-area');
    if (!data.length) {
      area.innerHTML = `<div class="empty-state"><i class="ti ti-circle-check" style="color:var(--success)"></i><p>Sin alertas activas</p></div>`;
      return;
    }
    const iconos = { vencimiento:'ti-calendar-x', stock:'ti-package-off' };
    area.innerHTML = `<div class="alerts-grid">${data.map(a=>`
      <div class="alert-row nivel-${a.nivel}">
        <i class="ti ${iconos[a.tipo]||'ti-alert-circle'} alert-icon" aria-hidden="true"></i>
        <div>
          <div class="alert-desc">${a.descripcion}</div>
          <div class="alert-detalle">${a.tipo==='vencimiento'?'Vence: '+a.detalle:a.detalle}</div>
        </div>
      </div>`).join('')}</div>`;
  } catch { toast('Error cargando alertas','err'); }
}

renderSidebar('dashboard');
cargarKPIs();
cargarAlertas();
</script>
</body>
</html>
