<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuarios | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Gestión de usuarios</div>
      <div class="topbar-sub" id="usr-count"></div>
    </div>
    <button class="btn btn-primary" onclick="abrirNuevo()">
      <i class="ti ti-user-plus" aria-hidden="true"></i> Nuevo usuario
    </button>
  </div>
  <div class="page">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal nuevo / editar -->
<div class="modal-backdrop" id="modal-form">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nuevo usuario</span>
      <button class="btn-icon" onclick="closeModal('modal-form')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input type="text" class="form-control" id="f-nombre" placeholder="Nombre">
        </div>
        <div class="form-group">
          <label class="form-label">Usuario *</label>
          <input type="text" class="form-control" id="f-usuario" placeholder="login">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico <span style="color:var(--text-3);font-weight:400">(para recuperar contraseña)</span></label>
        <input type="email" class="form-control" id="f-email" placeholder="correo@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" id="pass-label">Contraseña *</label>
          <input type="password" class="form-control" id="f-pass" placeholder="Contraseña">
        </div>
        <div class="form-group">
          <label class="form-label">Rol *</label>
          <select class="form-control" id="f-rol">
            <option value="empleado">Empleado</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>
      </div>
      <div id="pass-hint" style="display:none;font-size:.78rem;color:var(--text-3);margin-top:-.5rem;margin-bottom:.5rem">
        Dejar en blanco para conservar la contraseña actual.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-form')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
requireAuth('administrador');
renderSidebar('usuarios');
let todos = [];

async function cargar() {
  const r = await fetch(`${API}/usuarios`);
  todos = await r.json();
  document.getElementById('usr-count').textContent = `${todos.length} usuarios`;
  renderTabla(todos);
}

function renderTabla(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="ti ti-users"></i><p>Sin usuarios</p></div></td></tr>`;
    return;
  }
  const me = JSON.parse(localStorage.getItem('usuarioActual') || '{}');
  tbody.innerHTML = data.map(usr => {
    const rolChip = usr.rol === 'administrador'
      ? '<span class="chip chip-danger">Administrador</span>'
      : '<span class="chip chip-neutral">Empleado</span>';
    const esSesion = usr.idusuario === me.idusuario;
    return `<tr>
      <td class="text-muted text-sm">${usr.idusuario}</td>
      <td class="font-medium">${usr.nombre}${esSesion?' <span class="chip chip-info" style="font-size:.68rem">Tú</span>':''}</td>
      <td><code style="font-size:.82rem;background:var(--surface-2);padding:2px 6px;border-radius:5px">${usr.usuario}</code></td>
      <td>${usr.email ? `<span style="font-size:.82rem">${usr.email}</span>` : '<span class="text-muted text-sm">—</span>'}</td>
      <td>${rolChip}</td>
      <td>
        <div class="flex-center gap-sm">
          <button class="btn-icon btn-sm" onclick='abrirEdit(${JSON.stringify(usr)})' title="Editar">
            <i class="ti ti-edit"></i>
          </button>
          ${!esSesion ? `<button class="btn-icon btn-sm" onclick="eliminar(${usr.idusuario})" title="Eliminar">
            <i class="ti ti-trash" style="color:var(--brand)"></i>
          </button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function abrirNuevo() {
  document.getElementById('edit-id').value    = '';
  document.getElementById('f-nombre').value   = '';
  document.getElementById('f-usuario').value  = '';
  document.getElementById('f-email').value    = '';
  document.getElementById('f-pass').value     = '';
  document.getElementById('f-rol').value      = 'empleado';
  document.getElementById('modal-title').textContent = 'Nuevo usuario';
  document.getElementById('pass-label').textContent  = 'Contraseña *';
  document.getElementById('pass-hint').style.display = 'none';
  openModal('modal-form');
}

function abrirEdit(usr) {
  document.getElementById('edit-id').value    = usr.idusuario;
  document.getElementById('f-nombre').value   = usr.nombre;
  document.getElementById('f-usuario').value  = usr.usuario;
  document.getElementById('f-email').value    = usr.email || '';
  document.getElementById('f-pass').value     = '';
  document.getElementById('f-rol').value      = usr.rol;
  document.getElementById('modal-title').textContent = 'Editar usuario';
  document.getElementById('pass-label').textContent  = 'Nueva contraseña';
  document.getElementById('pass-hint').style.display = 'block';
  openModal('modal-form');
}

async function guardar() {
  const id      = document.getElementById('edit-id').value;
  const nombre  = document.getElementById('f-nombre').value.trim();
  const usuario = document.getElementById('f-usuario').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const password= document.getElementById('f-pass').value;
  const rol     = document.getElementById('f-rol').value;

  if (!nombre || !usuario)        { toast('Nombre y usuario son obligatorios','warn'); return; }
  if (!id && !password)           { toast('La contraseña es obligatoria para usuarios nuevos','warn'); return; }
  if (email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
    toast('El correo electrónico no es válido','warn'); return;
  }

  try {
    const url    = id ? `${API}/usuarios/${id}` : `${API}/usuarios`;
    const method = id ? 'PUT' : 'POST';
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, usuario, email: email || null, password, rol })
    });
    if (!r.ok) { const e = await r.json(); toast(e.error,'err'); return; }
    toast(id ? 'Usuario actualizado' : 'Usuario creado','ok');
    closeModal('modal-form');
    cargar();
  } catch { toast('Error guardando','err'); }
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este usuario?')) return;
  await fetch(`${API}/usuarios/${id}`, { method: 'DELETE' });
  toast('Usuario eliminado','ok');
  cargar();
}

cargar();
</script>
</body>
</html>
