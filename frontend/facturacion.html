<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Facturación - Farmacia C&R</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">Farmacia C&R</div>
    <h2>Facturación</h2>

    <label for="medSelect">Buscar/seleccionar medicamento</label>
    <input list="medList" id="medSelect" placeholder="Escribe o selecciona...">
    <datalist id="medList"></datalist>

    <div id="lotArea" class="hidden" style="margin-top:0.6rem">
      <label for="lotSelect">Seleccionar lote (más antiguo primero)</label>
      <select id="lotSelect"></select>

      <div style="display:flex;gap:0.8rem;align-items:center;margin-top:0.6rem;">
        <div style="flex:1">
          <label>Precio por unidad (C$)</label>
          <input id="precioUnidad" type="text" readonly>
        </div>
        <div style="width:150px;">
          <label>Disponible</label>
          <input id="restanteLabel" type="text" readonly>
        </div>
      </div>

      <div style="margin-top:0.6rem;">
        <label>Cantidad a vender</label>
        <input id="cantidadFact" type="number" min="1" value="1">
      </div>

      <button id="addBtn">Agregar al ticket</button>
    </div>

    <div class="table-wrapper">
      <table id="ticketTable">
        <thead>
          <tr>
            <th>Medicamento</th>
            <th>Lote (Ingreso)</th>
            <th>Cantidad</th>
            <th>Precio unidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="invoice-footer">
      <div class="small">* Al agregar, se descuenta del inventario. Eliminar una fila restaurará la cantidad.</div>
      <div class="total-box">Total: <span id="total">C$ 0.00</span></div>
    </div>

    <div style="display:flex;gap:0.6rem;margin-top:0.8rem;">
      <button id="finalize" style="flex:1">Finalizar venta</button>
      <button id="cancel" style="flex:1;background:#ddd;color:#222">Cancelar venta</button>
    </div>

    <a href="dashboard.html"><button style="background:#eee;color:#222;margin-top:0.6rem">Volver al Panel</button></a>
  </div>

  

  <script>

function showNotice(msg){
  const old = document.querySelector('.notice-float');
  if (old) old.remove();

  const div = document.createElement('div');
  div.className = 'notice-float';
  div.textContent = msg;
  document.body.appendChild(div);

  setTimeout(()=> div.classList.add('show'), 50);

  function removeNotice(){
    if (!div) return;
    div.classList.remove('show');
    document.removeEventListener('keydown', removeNotice);
    document.removeEventListener('mousedown', removeNotice);
  }
  document.addEventListener('keydown', removeNotice);
  document.addEventListener('mousedown', removeNotice);
}

    function formatCurrency(n){ return 'C$ ' + Number(n).toFixed(2); }

    function migrateIfNeeded(inventario) {
      let changed=false;
      inventario = (inventario || []).map(l => {
        if (l.restante === undefined) { l.restante = ("totalPastillas" in l) ? l.totalPastillas : ((l.cajas||0)*(l.pastillasPorCaja||l.pastillas||0)); changed=true; }
        if (!l.fechaIngresoISO) { l.fechaIngresoISO = (l.loteId && !isNaN(Date.parse(l.loteId))) ? new Date(l.loteId).toISOString() : new Date().toISOString(); l.fechaIngresoLocal = l.fechaIngresoLocal || l.fechaIngreso || new Date(l.fechaIngresoISO).toLocaleString(); changed=true; }
        if (l.precioUnidad === undefined) { l.precioUnidad = (l.precio !== undefined) ? parseFloat(l.precio) : 0.0; changed=true; }
        return l;
      });
      if (changed) localStorage.setItem("inventario", JSON.stringify(inventario));
      return inventario;
    }

    let inventario = JSON.parse(localStorage.getItem('inventario')) || [];
    inventario = migrateIfNeeded(inventario);

    const medList = document.getElementById('medList');
    const uniqueNames = [...new Set(inventario.map(l => l.nombre))].sort();
    uniqueNames.forEach(n => {
      const o = document.createElement('option');
      o.value = n;
      medList.appendChild(o);
    });

    const medSelect = document.getElementById('medSelect');
    const lotArea = document.getElementById('lotArea');
    const lotSelect = document.getElementById('lotSelect');
    const precioUnidadInput = document.getElementById('precioUnidad');
    const restanteLabel = document.getElementById('restanteLabel');
    const cantidadFact = document.getElementById('cantidadFact');
    const addBtn = document.getElementById('addBtn');
    const ticketBody = document.querySelector('#ticketTable tbody');
    const totalSpan = document.getElementById('total');

    let ticket = [];

    function updateTotal(){
      const total = ticket.reduce((s,it)=> s + (it.cantidad * it.precioUnidad), 0);
      totalSpan.textContent = formatCurrency(total);
    }

    medSelect.addEventListener('input', function(){
      const name = this.value.trim();
      if (!name) { lotArea.classList.add('hidden'); return; }

      let lots = inventario.filter(l => l.nombre === name && (l.restante || 0) > 0);
      if (!lots.length){
        lotArea.classList.add('hidden');
        showNotice('⚠️ No hay stock disponible de ese medicamento.');
        return;
        }



      lots.sort((a,b) => new Date(a.fechaIngresoISO) - new Date(b.fechaIngresoISO));

      lotSelect.innerHTML = '';
      lots.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.loteId;
        opt.textContent = `${l.fechaIngresoLocal} — Rest: ${l.restante} — Exp: ${l.expira}`;
        lotSelect.appendChild(opt);
      });

      lotArea.classList.remove('hidden');

      lotSelect.dispatchEvent(new Event('change'));
    });

    lotSelect.addEventListener('change', function(){
      const loteId = this.value;
      const lote = inventario.find(l => l.loteId === loteId);
      if (!lote) return;
      precioUnidadInput.value = formatCurrency(lote.precioUnidad || 0);
      restanteLabel.value = lote.restante;
      cantidadFact.max = lote.restante;
      cantidadFact.value = Math.min(1, lote.restante || 1);
    });

    addBtn.addEventListener('click', function(){
      const medName = medSelect.value.trim();
      if (!medName) return alert('Selecciona un medicamento.');
      const loteId = lotSelect.value;
      const lote = inventario.find(l => l.loteId === loteId);
      if (!lote) return alert('Seleccione un lote válido.');
      const cantidad = parseInt(cantidadFact.value);
      if (!cantidad || cantidad <= 0) return alert('Ingrese una cantidad válida.');
      if (cantidad > lote.restante) return alert('No hay suficiente cantidad en ese lote.');

      const item = {
        id: 't' + Date.now() + Math.floor(Math.random()*1000),
        nombre: medName,
        loteId: lote.loteId,
        loteIngreso: lote.fechaIngresoLocal,
        cantidad,
        precioUnidad: parseFloat(lote.precioUnidad)
      };
      ticket.push(item);

      lote.restante -= cantidad;
      localStorage.setItem('inventario', JSON.stringify(inventario));

      renderTicketTable();
      updateTotal();

      lotSelect.dispatchEvent(new Event('change'));
    });

    function renderTicketTable(){
      ticketBody.innerHTML = '';
      ticket.forEach(it => {
        const tr = document.createElement('tr');
        const subtotal = it.cantidad * it.precioUnidad;
        tr.innerHTML = `
          <td>${it.nombre}</td>
          <td class="small">${it.loteIngreso}</td>
          <td>${it.cantidad}</td>
          <td>${formatCurrency(it.precioUnidad)}</td>
          <td>${formatCurrency(subtotal)}</td>
          <td><button class="btn-small btn-danger" data-id="${it.id}">Eliminar</button></td>
        `;
        ticketBody.appendChild(tr);
      });

      document.querySelectorAll('[data-id]').forEach(btn=>{
        btn.addEventListener('click', function(){
          const id = this.getAttribute('data-id');
          const index = ticket.findIndex(x => x.id === id);
          if (index === -1) return;
          const item = ticket[index];

          const lote = inventario.find(l => l.loteId === item.loteId);
          if (lote) {
            lote.restante = (lote.restante || 0) + item.cantidad;
            localStorage.setItem('inventario', JSON.stringify(inventario));
          }

          ticket.splice(index,1);
          renderTicketTable();
          updateTotal();

          if (medSelect.value.trim() === item.nombre) {
            medSelect.dispatchEvent(new Event('input'));
          }
        });
      });
    }

    document.getElementById('finalize').addEventListener('click', function(){
      if (!ticket.length) return alert('No hay artículos en el ticket.');
      ticket = [];
      renderTicketTable();
      updateTotal();
      alert('✅ Venta finalizada. Inventario actualizado.');
    });

    document.getElementById('cancel').addEventListener('click', function(){
      if (!ticket.length) { alert('No hay operación en curso.'); return; }
      ticket.forEach(it => {
        const lote = inventario.find(l => l.loteId === it.loteId);
        if (lote) lote.restante = (lote.restante || 0) + it.cantidad;
      });
      localStorage.setItem('inventario', JSON.stringify(inventario));
      ticket = [];
      renderTicketTable();
      updateTotal();
      alert('Operación cancelada. Cantidades restauradas en inventario.');
    });

  </script>
</body>
</html>
