<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle de Compras | Farmacia C&R</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #f8f8f8;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: #b23a48;
      color: white;
      padding: 1rem;
      width: 100%;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .container {
      margin-top: 2rem;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #b23a48;
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    table th, table td {
      padding: 0.8rem;
      border: 1px solid #ddd;
      text-align: center;
    }

    table th {
      background: #f3d0d3;
      color: #333;
    }
  </style>
</head>
<body>
  <header>Detalle de Compras</header>
  <div class="container">
    <h2>Historial de Compras</h2>
    <input type="text" id="busqueda" placeholder="Buscar por ID, fecha o proveedor..." onkeyup="filtrar()">
    <table>
      <thead>
        <tr>
          <th>ID Compra</th>
          <th>Fecha</th>
          <th>Proveedor</th>
          <th>Total Pago</th>
        </tr>
      </thead>
      <tbody id="tablaCompras"></tbody>
    </table>
  </div>

  <script>
    async function cargarCompras(){
      const res = await fetch("http://localhost:3000/compra");
      const data = await res.json();
      const tabla = document.getElementById("tablaCompras");
      tabla.innerHTML = "";
      data.forEach(c => {
        const fila = `
          <tr>
            <td>${c.idcompra}</td>
            <td>${new Date(c.fecha).toLocaleString()}</td>
            <td>${c.proveedor}</td>
            <td>${c.totalpago} C$</td>
          </tr>`;
        tabla.innerHTML += fila;
      });
    }

    function filtrar(){
      const texto = document.getElementById("busqueda").value.toLowerCase();
      const filas = document.querySelectorAll("#tablaCompras tr");
      filas.forEach(fila => {
        const contenido = fila.innerText.toLowerCase();
        fila.style.display = contenido.includes(texto) ? "" : "none";
      });
    }

    cargarCompras();
  </script>
</body>
</html>
