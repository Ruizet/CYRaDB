<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Historial de compras | Farmacia C&R</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.items-detalle{font-size:.8rem;color:var(--text-2);margin-top:.35rem;line-height:1.6}
.detail-list{display:flex;flex-direction:column;gap:.4rem;margin-top:.5rem}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem .6rem;background:var(--surface-2);border-radius:7px;font-size:.85rem}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Historial de compras</div>
      <div class="topbar-sub" id="comp-count"></div>
    </div>
    <div class="flex-center gap-sm">
      <input type="text" class="form-control" style="width:220px" id="buscar" placeholder="Buscar…" oninput="filtrar()">
      <button class="btn btn-ghost btn-sm" onclick="cargar()"><i class="ti ti-refresh" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="page">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>Proveedor</th>
              <th>Registrado por</th>
              <th>Ítems</th>
              <th>Total pagado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-backdrop" id="modal-detalle">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Detalle de compra</span>
      <button class="btn-icon" onclick="closeModal('modal-detalle')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-detalle')">Cerrar</button>
    </div>
  </div>
</div>

<div id="toast-area"></div>
<script src="app.js"></script>
<script>
const u = requireAuth();
renderSidebar('detallecompras');
let todas = [];

async function cargar() {
  try {
    const r = await fetch(`${API}/compras`);
    todas = await r.json();
    document.getElementById('comp-count').textContent = `${todas.length} compras registradas`;
    filtrar();
  } catch { toast('Error cargando compras','err'); }
}

function filtrar() {
  const q = document.getElementById('buscar').value.toLowerCase();
  const data = !q ? todas : todas.filter(c =>
    String(c.idcompra).includes(q) ||
    (c.proveedor||'').toLowerCase().includes(q) ||
    (c.usuario||'').toLowerCase().includes(q)
  );
  renderTabla(data);
}

function renderTabla(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-truck"></i><p>Sin compras</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(c => {
    const items = Array.isArray(c.items) ? c.items : [];
    const resumen = items.slice(0,2).map(i=>`${i.nombre} ×${i.cantidad}`).join(', ') + (items.length>2?` y ${items.length-2} más`:'');
    return `<tr>
      <td class="font-medium text-brand">#${c.idcompra}</td>
      <td>${fechaHora(c.fecha)}</td>
      <td class="font-medium">${c.proveedor}</td>
      <td>${c.usuario}</td>
      <td>
        <div class="font-medium text-sm">${items.length} producto(s)</div>
        <div class="items-detalle">${resumen||'—'}</div>
      </td>
      <td class="font-semi">C$ ${parseFloat(c.totalpago).toFixed(2)}</td>
      <td>
        <button class="btn-icon btn-sm" onclick='verDetalle(${JSON.stringify(c)})' title="Ver detalle">
          <i class="ti ti-eye"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

function verDetalle(c) {
  const items = Array.isArray(c.items) ? c.items : [];
  document.getElementById('modal-title').textContent = `Compra #${c.idcompra} — ${c.proveedor}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="flex-between mb-md">
      <div><div class="text-sm text-muted">Fecha</div><div class="font-medium">${fechaHora(c.fecha)}</div></div>
      <div><div class="text-sm text-muted">Registrado por</div><div class="font-medium">${c.usuario}</div></div>
      <div><div class="text-sm text-muted">Total pagado</div><div class="font-semi text-brand">C$ ${parseFloat(c.totalpago).toFixed(2)}</div></div>
    </div>
    <div class="form-label">Ítems de la compra</div>
    <div class="detail-list">
      ${items.map(i=>`
        <div class="detail-row">
          <div>
            <div class="font-medium">${i.nombre}</div>
            <div class="text-sm text-muted">${i.cantidad} unidades · C$ ${parseFloat(i.costo).toFixed(4)} c/u</div>
          </div>
          <div class="font-semi">C$ ${parseFloat(i.subtotal).toFixed(2)}</div>
        </div>`).join('')}
    </div>`;
  openModal('modal-detalle');
}

cargar();
</script>
</body>
</html>
